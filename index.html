<!DOCTYPE html> 
<html lang="pt-br"> 
  <head> 
    <meta charset="UTF-8" /> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
    <title>Flashcards de Mitos e Verdades</title> 
    <style>
      /* Configurações gerais da página */
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #eef5f6;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      header {
        text-align: center;
        margin-bottom: 30px;
        color: #2c3e50;
      }

      header p {
        color: #7f8c8d;
        font-style: italic;
      }

      /* Container principal do flashcard */
      .flashcard-container {
        width: 380px;
        height: 280px;
        perspective: 1000px;
        cursor: pointer;
      }

      /* O elemento interno que realmente vai girar */
      .flashcard-inner {
        position: relative;
        width: 100%;
        height: 100%;
        text-align: center;
        transition: transform 0.6s;
        transform-style: preserve-3d;
      }

      /* Classe que será ativada via JavaScript para girar o card */
      .flashcard-container.flipped .flashcard-inner {
        transform: rotateY(180deg);
      }

      /* Estilo comum para as duas faces do card */
      .card-front, .card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        -webkit-backface-visibility: hidden; /* Esconde a face oposta */
        backface-visibility: hidden;
        border-radius: 15px;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 25px;
        box-sizing: border-box;
      }

      /* Lado do MITO (Frente) apenas com a imagem original da tartaruga */
      .card-front {
        background: url('https://unsplash.com/photos/9R_bNdo4-2I/download?force=true') no-repeat center/cover;
        color: white;
      }

      /* Lado da VERDADE (Verso) apenas com a imagem original da tartaruga */
      .card-back {
        background: url('https://unsplash.com/photos/3GgbJx7hg14/download?force=true') no-repeat center/cover;
        color: white;
        transform: rotateY(180deg); /* Começa virado de costas */
      }

      /* Detalhes do texto */
      .badge {
        font-weight: bold;
        text-transform: uppercase;
        font-size: 1.2rem;
        letter-spacing: 1px;
        margin-bottom: 15px;
        background-color: rgba(0, 0, 0, 0.6); /* Fundo escurecido para dar contraste sobre a foto limpa */
        padding: 5px 15px;
        border-radius: 20px;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      }

      .text-content {
        font-size: 1.15rem;
        line-height: 1.5;
        margin: 0;
        text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8), 0 0 4px rgba(0, 0, 0, 0.5); /* Sombra reforçada para leitura sobre a foto */
      }

      footer {
        margin-top: 40px;}
